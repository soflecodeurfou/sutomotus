<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Supabase Auth FULL</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body {
  font-family: Arial;
  text-align: center;
  padding-top: 40px;
}

.box {
  border: 1px solid #ddd;
  padding: 20px;
  margin: 10px auto;
  width: 300px;
  border-radius: 10px;
}

input {
  width: 90%;
  padding: 8px;
  margin: 5px 0;
}

button {
  padding: 8px 12px;
  cursor: pointer;
  margin-top: 5px;
}

#status {
  margin-top: 20px;
  font-weight: bold;
}
</style>
</head>

<body>

<h2>Système Supabase</h2>

<!-- INSCRIPTION -->
<div class="box">
  <h3>Inscription</h3>
  <input id="r_email" placeholder="Email">
  <input id="r_username" placeholder="Pseudo">
  <input id="r_password" type="password" placeholder="Mot de passe">
  <button onclick="register()">Créer un compte</button>
</div>

<!-- CONNEXION -->
<div class="box">
  <h3>Connexion</h3>
  <input id="l_email" placeholder="Email">
  <input id="l_password" type="password" placeholder="Mot de passe">
  <button onclick="login()">Se connecter</button>
</div>

<button onclick="logout()">Logout</button>

<div id="status">Non connecté</div>

<script>

// 🔥 CONFIG SUPABASE
const SUPABASE_URL = "https://djolamqsceftrkqulldl.supabase.co";
const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRqb2xhbXFzY2VmdHJrcXVsbGRsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYwMTY5OTIsImV4cCI6MjA5MTU5Mjk5Mn0.UpuvC9P2sMAN34dbfxwjuOa7ByV4swDgqrt-x4xKyjg";

const db = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

// ---------------- CREATE PROFILE SAFE ----------------
async function ensureProfile(user, username = null) {
  if (!user) return;

  const { data } = await db
    .from("profiles")
    .select("*")
    .eq("id", user.id)
    .maybeSingle();

  if (!data) {
    const { error } = await db.from("profiles").insert({
      id: user.id,
      username: username || user.email.split("@")[0]
    });

    if (error) console.log("Profile error:", error);
  }
}

// ---------------- REGISTER ----------------
async function register() {
  const email = document.getElementById("r_email").value;
  const password = document.getElementById("r_password").value;
  const username = document.getElementById("r_username").value;

  if (!email || !password || !username)
    return alert("Remplis tout");

  const { data, error } = await db.auth.signUp({
    email,
    password
  });

  if (error) return alert(error.message);

  if (data?.user) {
    await ensureProfile(data.user, username);
  }

  alert("Compte créé !");
  loadUser();
}

// ---------------- LOGIN ----------------
async function login() {
  const email = document.getElementById("l_email").value;
  const password = document.getElementById("l_password").value;

  const { data, error } = await db.auth.signInWithPassword({
    email,
    password
  });

  if (error) return alert(error.message);

  if (data?.user) {
    await ensureProfile(data.user);
  }

  loadUser();
}

// ---------------- LOAD USER ----------------
async function loadUser() {
  const { data } = await db.auth.getUser();

  if (!data.user) {
    document.getElementById("status").innerText = "Non connecté";
    return;
  }

  const { data: profile } = await db
    .from("profiles")
    .select("*")
    .eq("id", data.user.id)
    .maybeSingle();

  document.getElementById("status").innerText =
    "Connecté : " + (profile?.username || data.user.email);
}

// ---------------- LOGOUT ----------------
async function logout() {
  await db.auth.signOut();
  location.reload();
}

// AUTO LOAD
loadUser();

</script>

</body>
</html>

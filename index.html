<!DOCTYPE html>
<html>
<head>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>

<body>

<h2>Créer un compte / Connexion</h2>

<input id="email" placeholder="email"><br><br>
<input id="password" type="password" placeholder="mot de passe"><br><br>
<input id="username" placeholder="pseudo"><br><br>
<input id="avatar" placeholder="url photo de profil"><br><br>

<button onclick="register()">Créer compte</button>
<button onclick="login()">Se connecter</button>

<hr>

<h2>Utilisateur connecté</h2>
<p id="user"></p>
<img id="avatarImg" width="100">

<script>
const db = window.supabase.createClient(
  "https://djolamqsceftrkqulldl.supabase.co",
  "sb_publishable_rwC-DCZvgYXfRAb23izSbg_kwsiGzAt"
);

let currentUser = null;

// INSCRIPTION
async function register(){
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;
  const username = document.getElementById("username").value;
  const avatar = document.getElementById("avatar").value;

  const { data, error } = await db.auth.signUp({
    email,
    password
  });

  if(error){
    alert(error.message);
    return;
  }

  const user = data.user;

  await db.from("profiles").insert({
    id: user.id,
    email: email,
    username: username,
    avatar_url: avatar
  });

  alert("Compte créé !");
}

// CONNEXION
async function login(){
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  const { data, error } = await db.auth.signInWithPassword({
    email,
    password
  });

  if(error){
    alert(error.message);
    return;
  }

  currentUser = data.user;
  loadProfile();
}

// CHARGER PROFIL
async function loadProfile(){
  const { data } = await db
    .from("profiles")
    .select("*")
    .eq("id", currentUser.id)
    .single();

  document.getElementById("user").innerText =
    "Pseudo : " + data.username + " | Email : " + data.email;

  document.getElementById("avatarImg").src = data.avatar_url;
}
</script>

</body>
</html>

<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Sutomotus Auth</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>

<body>

<h2>Connexion</h2>

<input id="email" placeholder="email">
<button onclick="login()">Se connecter (magic link)</button>

<h3 id="status">Pas connecté</h3>

<button onclick="logout()">Se déconnecter</button>

<script>
// ⚡ CONFIG
const supabase = window.supabase.createClient(
  "https://djolamqsceftrkqulldl.supabase.co",
  "sb_publishable_rwC-DCZvgYXfRAb23izSbg_kwsiGzAt"
);

// 🔐 LOGIN MAGIC LINK
async function login() {
  const email = document.getElementById("email").value;

  const { error } = await supabase.auth.signInWithOtp({
    email: email
  });

  if (error) {
    alert(error.message);
  } else {
    alert("📧 Email envoyé ! Regarde ta boîte mail.");
  }
}

// 👤 CREATE PROFILE SI EXISTE PAS
async function createProfile(user) {
  const { data } = await supabase
    .from("profiles")
    .select("*")
    .eq("id", user.id)
    .maybeSingle();

  if (!data) {
    await supabase.from("profiles").insert({
      id: user.id,
      username: user.email.split("@")[0],
      avatar: ""
    });
  }
}

// 📥 LOAD USER
async function loadUser() {
  const { data } = await supabase.auth.getUser();

  if (!data.user) {
    document.getElementById("status").innerText = "Pas connecté";
    return;
  }

  await createProfile(data.user);

  const { data: profile } = await supabase
    .from("profiles")
    .select("*")
    .eq("id", data.user.id)
    .maybeSingle();

  document.getElementById("status").innerText =
    "Connecté : " + (profile?.username || data.user.email);
}

// 🚪 LOGOUT
async function logout() {
  await supabase.auth.signOut();
  location.reload();
}

// 🔄 AUTO LOGIN (important pour magic link)
window.addEventListener("load", async () => {
  await loadUser();
});
</script>

</body>
</html>

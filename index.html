<!DOCTYPE html>
<html>
<head>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>

<body>

<h2>Connexion / Inscription</h2>
<input id="email" placeholder="email"><br>
<input id="pass" type="password" placeholder="password"><br>
<button onclick="auth()">GO</button>

<hr>

<h2>Profil</h2>
<p id="user"></p>

<input id="username" placeholder="pseudo">
<input id="avatar" placeholder="url avatar">
<button onclick="saveProfile()">Sauvegarder</button>

<hr>

<h2>Ajouter un ami</h2>
<input id="friendEmail" placeholder="email ami">
<button onclick="addFriend()">Ajouter</button>

<h3>Mes amis</h3>
<ul id="friends"></ul>

<script>
const supabase = window.supabase.createClient(
  "https://djolamqsceftrkqulldl.supabase.co",
  "sb_publishable_rwC-DCZvgYXfRAb23izSbg_kwsiGzAt"
);

let user = null;

// LOGIN / REGISTER
async function auth(){
  const email = document.getElementById("email").value;
  const pass = document.getElementById("pass").value;

  let { data, error } = await supabase.auth.signInWithPassword({
    email,
    password: pass
  });

  if(error){
    let res = await supabase.auth.signUp({
      email,
      password: pass
    });

    user = res.data.user;

    await supabase.from("profiles").insert({
      id: user.id,
      email: email,
      username: email.split("@")[0]
    });

  } else {
    user = data.user;
  }

  loadUser();
}

// LOAD USER
async function loadUser(){
  const { data } = await supabase.auth.getUser();
  user = data.user;

  document.getElementById("user").innerText = user.email;

  loadFriends();
}

// SAVE PROFILE
async function saveProfile(){
  const username = document.getElementById("username").value;
  const avatar = document.getElementById("avatar").value;

  await supabase.from("profiles").update({
    username: username,
    avatar_url: avatar
  }).eq("id", user.id);

  alert("Profil sauvegardé");
}

// ADD FRIEND
async function addFriend(){
  const email = document.getElementById("friendEmail").value;

  const { data: friend } = await supabase
    .from("profiles")
    .select("*")
    .eq("email", email)
    .single();

  if(!friend) return alert("Utilisateur introuvable");

  await supabase.from("friends").insert({
    user_id: user.id,
    friend_id: friend.id,
    status: "pending"
  });

  alert("Demande envoyée !");
}

// LOAD FRIENDS
async function loadFriends(){
  const { data } = await supabase
    .from("friends")
    .select("*, profiles:friend_id(username, avatar_url)")
    .eq("user_id", user.id);

  const list = document.getElementById("friends");
  list.innerHTML = "";

  if(!data || data.length === 0){
    list.innerHTML = "<li>Aucun ami</li>";
    return;
  }

  data.forEach(f => {
    const li = document.createElement("li");
    li.innerText = f.profiles?.username + " (" + f.status + ")";
    list.appendChild(li);
  });
}
</script>

</body>
</html>

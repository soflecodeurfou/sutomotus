<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Supabase Auth FIX</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body { font-family: Arial; text-align:center; padding-top:40px; }
input { padding:10px; margin:5px; }
button { padding:10px 15px; cursor:pointer; }
</style>
</head>

<body>

<h2>Auth Supabase</h2>

<input id="email" placeholder="email"><br>
<input id="password" type="password" placeholder="password"><br>

<button onclick="auth()">Connexion / Inscription</button>
<button onclick="logout()">Logout</button>

<h3 id="status">Non connecté</h3>

<script>

// 🔥 IMPORTANT : utilise TA ANON KEY (pas service_role)
const SUPABASE_URL = "https://djolamqsceftrkqulldl.supabase.co";
const SUPABASE_KEY = "TON_ANON_KEY_ICI";

const db = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

// ---------------- PROFILE ----------------
async function createProfile(user) {
  if (!user) return;

  const { data } = await db
    .from("profiles")
    .select("*")
    .eq("id", user.id)
    .maybeSingle();

  if (!data) {
    await db.from("profiles").insert({
      id: user.id,
      username: user.email.split("@")[0]
    });
  }
}

// ---------------- AUTH ----------------
async function auth() {
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  if (!email || !password) return alert("Remplis tout");

  let { data, error } = await db.auth.signInWithPassword({
    email,
    password
  });

  if (error) {
    const res = await db.auth.signUp({ email, password });
    if (res.error) return alert(res.error.message);
    data = res.data;
  }

  if (data?.user) {
    await createProfile(data.user);
  }

  loadUser();
}

// ---------------- LOAD USER ----------------
async function loadUser() {
  const { data } = await db.auth.getUser();

  if (!data.user) {
    document.getElementById("status").innerText = "Non connecté";
    return;
  }

  const { data: profile } = await db
    .from("profiles")
    .select("*")
    .eq("id", data.user.id)
    .maybeSingle();

  document.getElementById("status").innerText =
    "Connecté : " + (profile?.username || data.user.email);
}

// ---------------- LOGOUT ----------------
async function logout() {
  await db.auth.signOut();
  location.reload();
}

// auto
loadUser();

</script>

</body>
</html>

<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Sutomotus - Correction</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: sans-serif; padding: 20px; }
        .card { border: 1px solid #ccc; padding: 20px; max-width: 400px; border-radius: 8px; }
        input { width: 100%; padding: 8px; margin: 10px 0; }
        button { padding: 10px; cursor: pointer; background: #C6303A; color: white; border: none; border-radius: 4px; }
    </style>
</head>
<body>

<div class="card">
    <h2>Connexion</h2>
    <input id="email" placeholder="Ton email">
    <button onclick="handleLogin()">Se connecter (Magic Link)</button>
    
    <h3 id="status">Pas connecté</h3>
    <button onclick="logout()" style="background:#666">Se déconnecter</button>
    
    <hr>
    <button onclick="adminAccess()" style="background:#222; width:100%">🛠️ Mode Admin (carotte)</button>
</div>

<script>
// --- UNE SEULE DÉCLARATION ICI ---
const SB_URL = "https://djolamqsceftrkqulldl.supabase.co";
const SB_KEY = "sb_publishable_rwC-DCZvgYXfRAb23izSbg_kwsiGzAt";
const supabase = window.supabase.createClient(SB_URL, SB_KEY);

// --- FONCTION DE CONNEXION ---
async function handleLogin() {
    const email = document.getElementById("email").value;
    if(!email) return alert("Indique un email");

    const { error } = await supabase.auth.signInWithOtp({ email });

    if (error) {
        alert("Erreur: " + error.message);
    } else {
        alert("📧 Email envoyé ! Regarde ta boîte mail (et tes spams).");
    }
}

// --- VÉRIFICATION DE L'UTILISATEUR ---
async function loadUser() {
    const { data: { user } } = await supabase.auth.getUser();

    if (user) {
        // Création du profil si nouveau
        await supabase.from("profiles").maybeSingle(); // Juste pour vérifier l'accès
        document.getElementById("status").innerText = "Connecté : " + user.email;
    } else {
        document.getElementById("status").innerText = "Pas connecté";
    }
}

// --- MODE ADMIN ---
function adminAccess() {
    const mdp = prompt("Mot de passe :");
    if(mdp === "carotte") {
        alert("🛠️ Accès Admin OK !");
        // Ici tu peux lancer ton jeu
    } else {
        alert("Faux !");
    }
}

async function logout() {
    await supabase.auth.signOut();
    location.reload();
}

// Lancer au chargement
window.onload = loadUser;
</script>

</body>
</html>
